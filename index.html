<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raha Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 pb-20">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-white text-center rounded-b-3xl shadow-lg">
        <h1 class="text-2xl font-bold">🛒 RAHA MARKET</h1>
        <p class="text-sm opacity-80">Jual Beli Amanah di Pulau Muna</p>
    </div>

    <!-- Container Barang -->
    <div id="item-list" class="p-4 grid grid-cols-1 gap-4">
        <p class="text-center text-gray-500">Memuat jualan...</p>
    </div>

    <!-- Tombol Tambah Jualan -->
    <button onclick="bukaModal()" class="fixed bottom-6 right-6 bg-emerald-500 text-white p-4 rounded-full shadow-2xl text-2xl">+</button>

    <!-- Modal Form (Sederhana) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Tambah Jualan</h2>
            <input id="nama" type="text" placeholder="Nama Barang" class="w-full border p-2 rounded mb-2">
            <input id="harga" type="number" placeholder="Harga (Rp)" class="w-full border p-2 rounded mb-2">
            <input id="wa" type="text" placeholder="No WhatsApp (Contoh: 0812...)" class="w-full border p-2 rounded mb-4">
            <div class="flex gap-2">
                <button onclick="tutupModal()" class="flex-1 bg-gray-200 p-2 rounded">Batal</button>
                <button onclick="simpanBarang()" class="flex-1 bg-blue-600 text-white p-2 rounded">Posting</button>
            </div>
        </div>
    </div>

    <script>
        // Ambil Data dari MongoDB
        async function loadItems() {
            const res = await fetch('/api/items');
            const items = await res.json();
            const list = document.getElementById('item-list');
            list.innerHTML = '';

            if (items.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400">Belum ada jualan. Jadilah yang pertama!</p>';
                return;
            }

            items.forEach(item => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-blue-100">
                        <h3 class="font-bold text-lg">${item.nama}</h3>
                        <p class="text-blue-600 font-bold text-xl">Rp ${Number(item.harga).toLocaleString('id-ID')}</p>
                        <a href="https://wa.me/${item.wa}" class="mt-3 block text-center bg-green-500 text-white py-2 rounded-xl text-sm font-bold">Chat Penjual</a>
                    </div>
                `;
            });
        }

        // Simpan Data ke MongoDB
        async function simpanBarang() {
            const data = {
                nama: document.getElementById('nama').value,
                harga: document.getElementById('harga').value,
                wa: document.getElementById('wa').value
            };

            await fetch('/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            tutupModal();
            loadItems(); // Refresh daftar
        }

        function bukaModal() { document.getElementById('modal').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal').classList.add('hidden'); }

        loadItems(); // Jalankan saat web dibuka
    </script>
</body>
</html>
