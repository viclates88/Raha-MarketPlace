<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raha Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 pb-24">

    <!-- Header Biru (Gaya Lama) -->
    <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-8 text-white text-center rounded-b-[2.5rem] shadow-md">
        <h1 class="text-2xl font-bold">🛒 RAHA MARKET</h1>
        <p class="text-xs opacity-80 mt-1">Jual Beli Amanah di Pulau Muna</p>
    </div>

    <!-- Kotak Nama & Cari -->
    <div class="px-4 -mt-6 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm flex gap-2 border border-gray-100">
            <input type="text" placeholder="Nama ko..." class="flex-1 bg-slate-50 p-3 rounded-xl outline-none text-sm border-none">
            <button class="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold text-sm">Masuk</button>
        </div>
        
        <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-3 border border-gray-100">
            <span>🔍</span>
            <input type="text" id="inputCari" placeholder="Cari barang..." class="flex-1 outline-none text-sm">
        </div>
    </div>

    <!-- Kategori -->
    <div class="px-4 mt-4 flex gap-2 overflow-x-auto no-scrollbar pb-1">
        <button class="bg-blue-500 text-white px-5 py-2 rounded-xl text-sm font-medium shrink-0">Semua</button>
        <button class="bg-white text-gray-500 px-5 py-2 rounded-xl text-sm border border-gray-50 shrink-0">HP</button>
        <button class="bg-white text-gray-500 px-5 py-2 rounded-xl text-sm border border-gray-50 shrink-0">Motor</button>
        <button class="bg-white text-gray-500 px-5 py-2 rounded-xl text-sm border border-gray-50 shrink-0">Makan</button>
    </div>

    <!-- DAFTAR BARANG ( GRID YANG STABIL ) -->
    <div id="item-list" class="px-4 mt-4 grid grid-cols-2 gap-4">
        <!-- Barang akan muncul di sini tanpa kedip -->
    </div>

    <!-- Tombol Tambah Hijau Bulat -->
    <button onclick="bukaModal()" class="fixed bottom-8 right-6 bg-emerald-400 text-white w-16 h-16 rounded-full shadow-lg text-4xl flex items-center justify-center font-light active:scale-90 z-50">+</button>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">Tambah Jualan</h2>
            <div class="space-y-3">
                <input id="nama" type="text" placeholder="Nama Barang" class="w-full bg-slate-50 p-3 rounded-xl outline-none border border-gray-100 text-sm">
                <input id="harga" type="number" placeholder="Harga (Rp)" class="w-full bg-slate-50 p-3 rounded-xl outline-none border border-gray-100 text-sm">
                <input id="wa" type="text" placeholder="No WA (08...)" class="w-full bg-slate-50 p-3 rounded-xl outline-none border border-gray-100 text-sm">
                <input id="gambar" type="text" placeholder="Link Gambar (Tempel di sini)" class="w-full bg-slate-50 p-3 rounded-xl outline-none border border-gray-100 text-sm">
                <a href="https://postimages.org/" target="_blank" class="block text-center text-blue-500 font-bold text-xs underline">Klik untuk upload & ambil link foto</a>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="tutupModal()" class="flex-1 py-3 text-gray-400 font-bold">Batal</button>
                <button onclick="simpanBarang()" id="btnSimpan" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold shadow-md">Posting</button>
            </div>
        </div>
    </div>

    <script>
        let databaseBarang = [];

        // 1. Fungsi Ambil Data (Cuma jalan SEKALI saat buka web)
        async function ambilDataAwal() {
            const list = document.getElementById('item-list');
            list.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10">Mencari barang...</p>';

            try {
                const res = await fetch('/api/items');
                databaseBarang = await res.json();
                renderHalaman(databaseBarang);
            } catch (e) {
                list.innerHTML = '<p class="col-span-2 text-center text-red-400">Gagal ambil data.</p>';
            }
        }

        // 2. Fungsi Tampilkan ke Layar (Tanpa Loop Berbahaya)
        function renderHalaman(data) {
            const list = document.getElementById('item-list');
            if (data.length === 0) {
                list.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10">Belum ada jualan.</p>';
                return;
            }

            let htmlKonten = '';
            data.forEach(item => {
                const foto = item.gambar || 'https://via.placeholder.com/300x300?text=Raha+Market';
                const hargaRibuan = new Intl.NumberFormat('id-ID').format(item.harga || 0);
                const waLink = `https://wa.me/${(item.wa || '').replace(/^0/, '62')}`;

                htmlKonten += `
                    <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden flex flex-col border border-gray-50">
                        <div class="h-32 bg-slate-200">
                            <img src="${foto}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x300?text=Error+Foto'">
                        </div>
                        <div class="p-3">
                            <h3 class="text-sm font-medium text-gray-700 truncate uppercase">${item.nama}</h3>
                            <p class="text-blue-500 font-bold text-md mt-1 italic">Rp ${hargaRibuan}</p>
                            <a href="${waLink}" target="_blank" class="mt-2 block text-center text-emerald-500 text-[11px] font-bold border border-emerald-100 py-1.5 rounded-lg uppercase">Hubungi</a>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = htmlKonten;
        }

        // 3. Fungsi Simpan (Setelah simpan baru refresh)
        async function simpanBarang() {
            const btn = document.getElementById('btnSimpan');
            const data = {
                nama: document.getElementById('nama').value,
                harga: document.getElementById('harga').value,
                wa: document.getElementById('wa').value,
                gambar: document.getElementById('gambar').value
            };

            if(!data.nama || !data.harga) return alert("Lengkapi data!");

            btn.disabled = true;
            btn.innerText = "Sabar...";

            await fetch('/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // Kosongkan Form
            document.getElementById('nama').value = '';
            document.getElementById('harga').value = '';
            document.getElementById('wa').value = '';
            document.getElementById('gambar').value = '';

            tutupModal();
            ambilDataAwal(); // Refresh data setelah posting
            btn.disabled = false;
            btn.innerText = "Posting";
        }

        // 4. Fitur Cari (Cuma cari di data yang sudah ada, nda panggil database lagi)
        document.getElementById('inputCari').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const hasilFilter = databaseBarang.filter(item => 
                item.nama.toLowerCase().includes(keyword)
            );
            renderHalaman(hasilFilter);
        });

        function bukaModal() { document.getElementById('modal').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal').classList.add('hidden'); }

        // JALANKAN CUMA SEKALI SAJA PAS DIBUKA
        window.onload = ambilDataAwal;
    </script>
</body>
</html>
